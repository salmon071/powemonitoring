<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PowerSystem | Smart Alert</title>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --sidebar-bg: #111827;
            --main-bg: #0f172a;
            --card-bg: #1e293b;
            --accent: #38bdf8;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --border: #334155;
            --danger: #ef4444;
            --warning: #fbbf24;
        }

        * { box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--main-bg);
            color: var(--text-main);
            margin: 0;
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 260px;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 24px;
            flex-shrink: 0;
        }

        .logo {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 40px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        nav { display: flex; flex-direction: column; gap: 8px; }

        .nav-link {
            padding: 12px 16px;
            color: var(--text-dim);
            text-decoration: none;
            border-radius: 8px;
            font-weight: 500;
            transition: 0.2s;
        }

        .nav-link.active { background: #1f2937; color: var(--accent); }

        .main-content {
            flex: 1;
            padding: 40px;
            width: 100%;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #1e293b;
            padding: 6px 14px;
            border-radius: 99px;
            font-size: 0.8rem;
            border: 1px solid var(--border);
        }

        .dot { width: 8px; height: 8px; border-radius: 50%; background: #ef4444; }
        .dot.online { background: #22c55e; box-shadow: 0 0 10px #22c55e; }

        /* ALERT BOX STYLE */
        #alert-box {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-weight: 600;
            display: none;
            text-align: center;
            border: 1px solid transparent;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.8; }
            100% { opacity: 1; }
        }

        .alert-danger { background: rgba(239, 68, 68, 0.15); color: var(--danger); border-color: var(--danger) !important; display: block !important; }
        .alert-warning { background: rgba(251, 191, 36, 0.15); color: var(--warning); border-color: var(--warning) !important; display: block !important; }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
        }

        .card-title { color: var(--text-dim); font-size: 0.7rem; font-weight: 600; text-transform: uppercase; margin-bottom: 12px; }
        .card-value { font-size: 1.8rem; font-weight: 700; display: flex; align-items: baseline; justify-content: center; gap: 6px; }
        .unit { font-size: 0.9rem; color: var(--text-dim); font-weight: 400; }

        .chart-section {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            height: 300px;
            position: relative;
        }

        @media (max-width: 768px) {
            body { flex-direction: column; height: auto; overflow-y: auto; }
            .sidebar { width: 100%; padding: 20px; border-right: none; border-bottom: 1px solid var(--border); }
            nav { flex-direction: row; overflow-x: auto; gap: 10px; padding-bottom: 5px; scrollbar-width: none; }
            nav::-webkit-scrollbar { display: none; }
            .nav-link { padding: 10px 15px; font-size: 0.85rem; white-space: nowrap; background: rgba(255,255,255,0.03); }
            .main-content { padding: 20px; }
            .header { flex-direction: column; align-items: flex-start; gap: 15px; }
            .stats-grid { grid-template-columns: 1fr; gap: 15px; }
            .card-value { font-size: 2rem; }
            .chart-section { height: 250px; }
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="logo">⚡ PowerSystem</div>
        <nav>
            <a href="#" class="nav-link active">Overview</a>
            <a href="#" class="nav-link">Devices</a>
            <a href="#" class="nav-link">Settings</a>
        </nav>
    </aside>

    <main class="main-content">
        <header class="header">
            <div class="device-info">
                <h1>ESP32 Monitoring</h1>
                <p style="color: var(--text-dim); margin-top: 5px;">Frequency & Voltage Watcher</p>
            </div>
            <div class="status-badge">
                <span id="status-dot" class="dot"></span>
                <span id="status-text">Disconnected</span>
            </div>
        </header>

        <div id="alert-box"></div>

        <div class="stats-grid">
            <div class="card">
                <div class="card-title">Voltage</div>
                <div class="card-value"><span id="v">0.0</span> <span class="unit">V</span></div>
            </div>
            <div class="card">
                <div class="card-title" style="color: #a855f7;">Frequency</div>
                <div class="card-value" style="color: #a855f7;"><span id="f">0.00</span> <span class="unit">Hz</span></div>
            </div>
            <div class="card">
                <div class="card-title" style="color: #10b981;">Power</div>
                <div class="card-value" style="color: #10b981;"><span id="p">0.0</span> <span class="unit">W</span></div>
            </div>
            <div class="card">
                <div class="card-title" style="color: #38bdf8;">Efficiency</div>
                <div class="card-value" style="color: #38bdf8;"><span id="eff">0.0</span> <span class="unit">%</span></div>
            </div>
            <div class="card">
                <div class="card-title" style="color: #f43f5e;">Power Loss</div>
                <div class="card-value" style="color: #f43f5e;"><span id="p_loss">0.0</span> <span class="unit">W</span></div>
            </div>
        </div>

        <div class="chart-section">
            <div class="card-title">Voltage History</div>
            <canvas id="voltageChart"></canvas>
        </div>
    </main>

    <script>
        const host = 'wss://na1f1916.ala.asia-southeast1.emqxsl.com:8084/mqtt';
        const options = {
            username: 'salmon', 
            password: 'salmon123', 
            clientId: 'Web_Monitor_' + Math.random().toString(16).substr(2, 6)
        };

        const client = mqtt.connect(host, options);

        const ctx = document.getElementById('voltageChart').getContext('2d');
        const chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: Array(20).fill(''),
                datasets: [{
                    data: Array(20).fill(null),
                    borderColor: '#38bdf8',
                    backgroundColor: 'rgba(56, 189, 248, 0.1)',
                    fill: true,
                    tension: 0.4,
                    pointRadius: 0,
                    borderWidth: 2
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    y: { grid: { color: '#334155' }, ticks: { color: '#94a3b8' } },
                    x: { display: false }
                }
            }
        });

        client.on('connect', () => {
            document.getElementById('status-dot').classList.add('online');
            document.getElementById('status-text').innerText = 'Connected';
            client.subscribe('pzem/realtime');
        });

        client.on('message', (topic, message) => {
            try {
                const data = JSON.parse(message.toString());
                const alertBox = document.getElementById('alert-box');
                
                let volt = data.v || 0;
                let freq = data.f || 0;
                let pin = data.p_in || 0; 
                let pout = data.p || 0; 
                let loss = Math.max(0, pin - pout);
                let efficiency = pin > 0 ? (pout / pin) * 100 : 0;

                // LOGIKA ALERT GABUNGAN
                let messages = [];
                let severity = ''; // 'danger' atau 'warning'

                // Check Voltage
                if (volt < 150 || volt > 250) {
                    messages.push(`Tegangan Kritis (${volt.toFixed(1)}V)`);
                    severity = 'danger';
                } else if (volt < 180) {
                    messages.push(`Tegangan Drop (${volt.toFixed(1)}V)`);
                    if (severity !== 'danger') severity = 'warning';
                }

                // Check Frequency (Alert jika tidak tepat 50.00 Hz)
                if (freq > 0) {
                    if (freq < 49.9 || freq > 51.0) {
                        messages.push(`Frekuensi Bahaya (${freq.toFixed(2)}Hz)`);
                        severity = 'danger';
                    } else if (freq !== 50.0) {
                        messages.push(`Frekuensi Tidak Stabil (${freq.toFixed(2)}Hz)`);
                        if (severity !== 'danger') severity = 'warning';
                    }
                }

                // Tampilkan Alert
                if (messages.length > 0) {
                    alertBox.className = severity === 'danger' ? 'alert-danger' : 'alert-warning';
                    alertBox.innerHTML = `⚠️ <b>SYSTEM ALERT:</b> ${messages.join(' | ')}`;
                } else {
                    alertBox.style.display = 'none';
                    alertBox.className = '';
                }

                // Update UI Card
                if(data.v !== undefined) {
                    document.getElementById('v').innerText = data.v.toFixed(1);
                    chart.data.datasets[0].data.push(data.v);
                    chart.data.datasets[0].data.shift();
                    chart.update('none');
                }
                if(data.f !== undefined) document.getElementById('f').innerText = data.f.toFixed(2);
                if(data.p !== undefined) document.getElementById('p').innerText = data.p.toFixed(1);
                
                document.getElementById('p_loss').innerText = loss.toFixed(1);
                document.getElementById('eff').innerText = Math.min(100, efficiency).toFixed(1);

            } catch (e) { console.error(e); }
        });
    </script>
</body>
</html>
